name: Deploy site + multiplayer

# Publishes, as one GitHub Pages deploy:
#   /            -> the static marketing site
#   /multiplayer -> the (private) multiplayer client  (Blovely133/TestingMultiplayer)
#   /play        -> the (private) single-player game  (Blovely133/desktop-tutorial, production)
# Auth: secret MP_REPO_TOKEN (PAT, Contents:read on TestingMultiplayer) for /multiplayer;
#       secret DT_DEPLOY_KEY (read-only deploy key on desktop-tutorial) for /play.
# /play builds from desktop-tutorial since 2026-07: the SylvasBlessingGame fork was
# retired to end code drift between the two deployments (one source of truth; the
# platform-specific code is gated at build time by --base=/play/).
# Requires Pages "Source" = GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout multiplayer (private)
        uses: actions/checkout@v4
        with:
          repository: Blovely133/TestingMultiplayer
          ref: main
          token: ${{ secrets.MP_REPO_TOKEN }}
          path: mp

      - name: Checkout single-player game (private, production)
        uses: actions/checkout@v4
        with:
          repository: Blovely133/desktop-tutorial
          ref: main
          ssh-key: ${{ secrets.DT_DEPLOY_KEY }}
          path: play

      # Card-set data branches (Sylva's Gauntlet). Published at /sets/<set>/ so both
      # game clients load sets by URL at runtime (cards.json + faces/ + art/). These
      # used to be fetched from raw.githubusercontent, which broke when the source
      # repo went private — GitHub Pages (here) is public and sends
      # Access-Control-Allow-Origin: *, so the github.io mirrors can fetch them too.
      - name: Checkout Sylva's Gauntlet set data (draftformat branch)
        uses: actions/checkout@v4
        with:
          repository: Blovely133/desktop-tutorial
          ref: draftformat
          ssh-key: ${{ secrets.DT_DEPLOY_KEY }}
          path: gauntlet-data

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            mp/package-lock.json
            play/package-lock.json

      - name: Build multiplayer (base /multiplayer/)
        working-directory: mp
        run: |
          npm ci
          npm run build -- --base=/multiplayer/

      - name: Build single-player game (base /play/)
        working-directory: play
        run: |
          npm ci
          npm run build -- --base=/play/

      - name: Assemble Pages output
        run: |
          rm -rf public
          mkdir -p public
          # static marketing site at the domain root (keeps CNAME -> sylvasblessing.com)
          cp -a site/. public/
          rm -rf public/.git public/.github
          # built multiplayer client served at /multiplayer/
          mkdir -p public/multiplayer
          cp -a mp/dist/. public/multiplayer/
          # built single-player game served at /play/
          mkdir -p public/play
          cp -a play/dist/. public/play/
          # First-gesture audio unlock shim (see the file header for why):
          # Chrome keeps the game's AudioContext suspended until resume() runs
          # inside a user gesture, which left music silent until the volume
          # slider was dragged. Classic script in <head> runs before the
          # game's deferred module bundle. Remove once fixed upstream in
          # desktop-tutorial.
          cp site/.github/deploy/play-audio-unlock.js public/play/audio-unlock.js
          sed -i 's#<head>#<head><script src="/play/audio-unlock.js"></script>#' public/play/index.html
          grep -q '/play/audio-unlock.js' public/play/index.html
          # card sets served at /sets/<set>/ (cards.json + faces/ + art/)
          mkdir -p public/sets/gauntlet
          cp -a gauntlet-data/dist/. public/sets/gauntlet/
          touch public/.nojekyll
          echo "----- public/ -----"; ls -la public
          echo "----- public/multiplayer/ -----"; ls -la public/multiplayer
          echo "----- public/play/ -----"; ls -la public/play

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
